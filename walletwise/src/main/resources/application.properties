spring.application.name=walletwise

# ── Database ──────────────────────────────────────────────────────────────────
# Easy mode: works with H2 automatically, no database setup required.
# Production mode: set DB_URL, DB_USERNAME and DB_PASSWORD on Render/Railway for MySQL.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/walletwise;MODE=MySQL;DATABASE_TO_UPPER=false}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Session ───────────────────────────────────────────────────────────────────
server.servlet.session.timeout=1h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# Friendly errors for API test output
server.error.include-message=always
server.error.include-binding-errors=always
